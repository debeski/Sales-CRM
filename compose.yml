name: switch_pos

x-environment:
  # Database settings
  &de
  POSTGRES_DB: "switch_pos_db"
  POSTGRES_PORT: "5432"
  POSTGRES_HOST: "db"
  # Redis / Celery
  REDIS_URL_DB: "redis://redis:6379/1"
  CELERY_BROKER_URL: "redis://redis:6379/2"
  CELERY_RESULT_BACKEND: "redis://redis:6379/3"
  # Backup settings
  BACKUP_INTERVAL: "${BACKUP_INTERVAL:-680400}"
  # Web app settings (override these in compose.dev.yml or .env)
  ALLOWED_HOSTS: "${ALLOWED_HOSTS:-web,nginx,localhost,127.0.0.1}"
  ALLOWED_URLS: "${ALLOWED_URLS:-http://localhost:81}"
  BASE_URL: "${BASE_URL:-http://localhost}"
  DEBUG_STATUS: "${DEBUG_STATUS:-False}"
  # App email settings. The app talks to the internal SMTP relay; only the relay has public egress.
  EMAIL_BACKEND: "django.core.mail.backends.smtp.EmailBackend"
  EMAIL_HOST: "smtp-relay"
  EMAIL_PORT: "1025"
  EMAIL_USE_TLS: "False"
  EMAIL_USE_SSL: "False"
  DEFAULT_FROM_EMAIL: "${DEFAULT_FROM_EMAIL:-webmaster@localhost}"

services:
  db:
    image: postgres:17
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      <<: *de
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin_pass}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - switch_pos_internal

  redis:
    image: redis:7
    restart: always
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec", "--maxmemory", "500mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - switch_pos_internal

  smtp-relay:
    image: ${WEB_IMAGE:-switch_pos:latest}
    restart: always
    entrypoint: []
    command: ["python", "-m", "tools.smtp_relay"]
    environment:
      <<: *de
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin_pass}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-local_secret}
      DJANGO_SETTINGS_MODULE: "config.settings"
      SMTP_RELAY_LISTEN_HOST: "0.0.0.0"
      SMTP_RELAY_LISTEN_PORT: "1025"
      SMTP_RELAY_HOST: "${SMTP_RELAY_HOST:-smtp.gmail.com}"
      SMTP_RELAY_PORT: "${SMTP_RELAY_PORT:-587}"
      SMTP_RELAY_USE_TLS: "${SMTP_RELAY_USE_TLS:-True}"
      SMTP_RELAY_USER: "${SMTP_RELAY_USER:-}"
      SMTP_RELAY_PASSWORD: "${SMTP_RELAY_PASSWORD:-}"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('127.0.0.1', 1025), 5).close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - switch_pos_net
      - switch_pos_internal

  nginx:
    image: nginx:latest
    restart: always
    ports:
      - target: 80
        published: "${NGINX_PORT:-80}"
        protocol: tcp
    volumes:
      - ./.nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static:/app/staticfiles:ro
      - ./media/:/app/media:ro
    depends_on:
      web:
        condition: service_healthy
        restart: true
    healthcheck:
      test: ["CMD-SHELL", "nginx -t || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - switch_pos_net
      - switch_pos_internal

  web:
    image: ${WEB_IMAGE:-switch_pos:latest}
    restart: always
    command: >
      bash -c ' if [ "$$DEBUG_STATUS" = "True" ]; then
          echo "Starting in DEBUG mode with Django development server..."
          python manage.py runserver 0.0.0.0:8000
      else
          echo "Starting in PRODUCTION mode with Gunicorn..."
          gunicorn -c gunicorn.py config.wsgi:application
      fi'
    entrypoint: ["/app/entrypoint.sh"]
    post_start:
      - command: python manage.py migrator
    volumes:
      - static:/app/staticfiles:rw
      - ./media/:/app/media:rw
      - ./logs/:/app/logs:rw
      - ./imports/:/app/imports:ro
    environment:
      <<: *de
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin_pass}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-local_secret}
      ADMIN_PASS: ${ADMIN_PASS:-admin}
    healthcheck:
      test: [ "CMD", "python", "manage.py", "check" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      smtp-relay:
        condition: service_healthy
    networks:
      - switch_pos_internal

  celery:
    image: ${WEB_IMAGE:-switch_pos:latest}
    restart: always
    command: ["python", "-m", "celery", "-A", "config", "worker", "-B", "--loglevel=info"]
    entrypoint: ["/app/entrypoint.sh"]
    volumes:
      - static:/app/staticfiles:ro
      - ./media/:/app/media:rw
      - ./logs/:/app/logs:rw
    environment:
      <<: *de
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin_pass}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-local_secret}
      ADMIN_PASS: ${ADMIN_PASS:-admin}
    healthcheck:
      test: ["CMD", "python", "-m", "celery", "-A", "config", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - switch_pos_internal

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@local.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:80').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      db:
        condition: service_healthy
    networks:
      - switch_pos_internal

  db-backup:
    image: postgres:17
    restart: always
    command: >
      bash -c ' while true; do
          export PGPASSWORD=$$POSTGRES_PASSWORD
          backup_file="/.backups/backup_$$(date +%Y-%m-%d_%H-%M-%S).pgdump"
          echo "Starting backup: $$backup_file"
          attempts=0
          max_attempts=5
          until pg_dump -Fc -h $$POSTGRES_HOST -U $$POSTGRES_USER $$POSTGRES_DB -f $$backup_file || [ $$attempts -ge $$max_attempts ]; do
              echo "pg_dump failed, retrying..."
              attempts=$$((attempts+1))
              sleep 5
          done
          if [ $$attempts -ge $$max_attempts ]; then
              echo "Backup failed after $$attempts attempts" >&2
              rm -f $$backup_file
          else
              echo "Backup successful: $$backup_file"
              cd /.backups && ls -tp *.pgdump | grep -v "/$$" | tail -n +4 | xargs -I {} rm -- {}
          fi
          sleep $$BACKUP_INTERVAL
      done'
    volumes:
      - ./.backups/:/.backups:rw
    environment:
      <<: *de
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin_pass}
    healthcheck:
      test: ["CMD-SHELL", "[ -d /.backups ] || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      db:
        condition: service_healthy
    networks:
      - switch_pos_internal

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:
  static:

networks:
  switch_pos_net:
    driver: bridge
  switch_pos_internal:
    internal: true