name: sales

x-environment:
  # Database settings
  &de
  WEB_IMAGE: "${WEB_IMAGE:-debeski/sales:latest}"
  POSTGRES_DB: "sales_db"
  POSTGRES_PORT: "5432"
  POSTGRES_HOST: "db"
  # Redis / Celery
  REDIS_URL_DB: "redis://redis:6379/1"
  CELERY_BROKER_URL: "redis://redis:6379/2"
  CELERY_RESULT_BACKEND: "redis://redis:6379/3"
  # Backup settings
  BACKUP_INTERVAL: "${BACKUP_INTERVAL:-680400}"
  # Web app settings (override these in compose.dev.yml or .env)
  # Django/DLux owns the public/staff path split on the canonical host.
  # The legacy erp.<domain> host may redirect to /staff/ at Caddy.
  ALLOWED_HOSTS: "${ALLOWED_HOSTS:-web,localhost,127.0.0.1,switchlibya.ly,www.switchlibya.ly,erp.switchlibya.ly,caddy}"
  ALLOWED_URLS: "${ALLOWED_URLS:-https://switchlibya.ly,https://www.switchlibya.ly}"
  BASE_URL: "${BASE_URL:-https://switchlibya.ly}"
  DEBUG_STATUS: "${DEBUG_STATUS:-False}"
  # DjangoLux verified inline updater (generated Compose deployments only)
  DLUX_INLINE_UPDATES_ENABLED: "True"
  DLUX_UPDATE_CHECK_INTERVAL: "${DLUX_UPDATE_CHECK_INTERVAL:-86400}"
  DLUX_UPDATE_RUNTIME_ROOT: "/opt/dlux-runtime"
  # App email settings. The app talks to the internal SMTP relay; only the relay has public egress.
  EMAIL_BACKEND: "django.core.mail.backends.smtp.EmailBackend"
  EMAIL_HOST: "smtp-relay"
  EMAIL_PORT: "1025"
  EMAIL_USE_TLS: "False"
  EMAIL_USE_SSL: "False"
  DEFAULT_FROM_EMAIL: "${DEFAULT_FROM_EMAIL:-webmaster@localhost}"

services:
  db:
    image: postgres:17
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      <<: *de
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin_pass}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7
    restart: always
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec", "--maxmemory", "500mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  smtp-relay:
    image: ${WEB_IMAGE:-debeski/sales:latest}
    restart: always
    entrypoint: []
    command: ["python", "-m", "tools.smtp_relay"]
    environment:
      <<: *de
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin_pass}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-local_secret}
      DJANGO_SETTINGS_MODULE: "config.settings"
      SMTP_RELAY_LISTEN_HOST: "0.0.0.0"
      SMTP_RELAY_LISTEN_PORT: "1025"
      SMTP_RELAY_HOST: "${SMTP_RELAY_HOST:-smtp.gmail.com}"
      SMTP_RELAY_PORT: "${SMTP_RELAY_PORT:-587}"
      SMTP_RELAY_USE_TLS: "${SMTP_RELAY_USE_TLS:-True}"
      SMTP_RELAY_USER: "${SMTP_RELAY_USER:-}"
      SMTP_RELAY_PASSWORD: "${SMTP_RELAY_PASSWORD:-}"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('127.0.0.1', 1025), 5).close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - egress
      - internal

  # DjangoLux updater start
  dlux-updater:
    image: ${WEB_IMAGE:-debeski/sales:latest}
    restart: always
    command: ["python", "-m", "tools.dlux_runtime_supervisor", "--no-watch", "--", "bash", "-c", "python manage.py migrator && exec python manage.py dlux_update_worker"]
    entrypoint: ["/app/entrypoint.sh"]
    volumes:
      - dlux_runtime:/opt/dlux-runtime:rw
      - static:/app/staticfiles:rw
      - ./media/:/app/media:rw
      - ./logs/:/app/logs:rw
    environment:
      <<: *de
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin_pass}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-local_secret}
      ADMIN_PASS: ${ADMIN_PASS:-admin}
    healthcheck:
      test: ["CMD", "python", "-m", "dlux.updater.health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
      - egress
  # DjangoLux updater end

  caddy:
    image: caddy:latest
    restart: always
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      # Canonical Django/DLux host(s), space-separated; Caddy auto-provisions certs.
      # e.g. "switchlibya.ly www.switchlibya.ly"
      CADDY_SITE_ADDRESS: "${CADDY_SITE_ADDRESS:-switchlibya.ly www.switchlibya.ly}"
      # Optional legacy ERP hostname redirected to CADDY_PRIMARY_URL/staff/.
      CADDY_ERP_ADDRESS: "${CADDY_ERP_ADDRESS:-erp.switchlibya.ly}"
      CADDY_PRIMARY_URL: "${CADDY_PRIMARY_URL:-https://switchlibya.ly}"
      # Max upload size (Caddy units, e.g. 10MB).
      CADDY_MAX_SIZE: "${CADDY_MAX_SIZE:-10MB}"
    volumes:
      - ./.proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data        # certs + ACME account — MUST persist across restarts
      - caddy_config:/config
      - static:/app/staticfiles:ro
      - ./media/:/app/media:ro
      - dlux_runtime:/opt/dlux-runtime:ro
      - ./.proxy/maintenance.html:/usr/share/caddy/maintenance/maintenance.html:ro
    depends_on:
      # Not gated on web health / no restart:true — Caddy re-resolves web per dial,
      # so it stays up and keeps serving the maintenance progress page + /_update/*
      # polling while web is recreated during an image update.
      web:
        condition: service_started
    healthcheck:
      test: ["CMD", "caddy", "validate", "--adapter", "caddyfile", "--config", "/etc/caddy/Caddyfile"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - frontend
      - internal

  web:
    image: ${WEB_IMAGE:-debeski/sales:latest}
    restart: always
    command: >
      python -m tools.dlux_runtime_supervisor -- bash -c ' if [ "$$DEBUG_STATUS" = "True" ]; then
          echo "Starting in DEBUG mode with Django development server..."
          python manage.py runserver 0.0.0.0:8000
      else
          echo "Starting in PRODUCTION mode with Gunicorn..."
          gunicorn -c gunicorn.py config.wsgi:application
      fi'
    entrypoint: ["/app/entrypoint.sh"]
    volumes:
      - static:/app/staticfiles:rw
      - ./media/:/app/media:rw
      - ./logs/:/app/logs:rw
      - ./imports/:/app/imports:ro
      - dlux_runtime:/opt/dlux-runtime:ro
    environment:
      <<: *de
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin_pass}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-local_secret}
      ADMIN_PASS: ${ADMIN_PASS:-admin}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      smtp-relay:
        condition: service_healthy
      dlux-updater:
        condition: service_healthy
    networks:
      - internal

  celery:
    image: ${WEB_IMAGE:-debeski/sales:latest}
    restart: always
    command: ["python", "-m", "tools.dlux_runtime_supervisor", "--", "python", "-m", "celery", "-A", "config", "worker", "-B", "--loglevel=info"]
    entrypoint: ["/app/entrypoint.sh"]
    volumes:
      - static:/app/staticfiles:ro
      - ./media/:/app/media:rw
      - ./logs/:/app/logs:rw
      - dlux_runtime:/opt/dlux-runtime:ro
    environment:
      <<: *de
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin_pass}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-local_secret}
      ADMIN_PASS: ${ADMIN_PASS:-admin}
    healthcheck:
      test: ["CMD", "python", "-m", "celery", "-A", "config", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      dlux-updater:
        condition: service_healthy
    networks:
      - internal
      # Public egress so the periodic rate-scrape task (finance.tasks.refresh_market_rates)
      # can reach cbl.gov.ly / eanlibya.com. web stays internal-only and reads the
      # scraped rates from the shared Redis cache.
      - egress

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@local.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:80').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  db-backup:
    image: postgres:17
    restart: always
    command: >
      bash -c ' while true; do
          export PGPASSWORD=$$POSTGRES_PASSWORD
          backup_file="/.backups/backup_$$(date +%Y-%m-%d_%H-%M-%S).pgdump"
          echo "Starting backup: $$backup_file"
          attempts=0
          max_attempts=5
          until pg_dump -Fc -h $$POSTGRES_HOST -U $$POSTGRES_USER $$POSTGRES_DB -f $$backup_file || [ $$attempts -ge $$max_attempts ]; do
              echo "pg_dump failed, retrying..."
              attempts=$$((attempts+1))
              sleep 5
          done
          if [ $$attempts -ge $$max_attempts ]; then
              echo "Backup failed after $$attempts attempts" >&2
              rm -f $$backup_file
          else
              echo "Backup successful: $$backup_file"
              cd /.backups && ls -tp *.pgdump | grep -v "/$$" | tail -n +4 | xargs -I {} rm -- {}
          fi
          sleep $$BACKUP_INTERVAL
      done'
    volumes:
      - ./.backups/:/.backups:rw
    environment:
      <<: *de
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin_pass}
    healthcheck:
      test: ["CMD-SHELL", "[ -d /.backups ] || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  # Composer-as-updater start
  # Least-privilege Docker API gateway. composer-updater talks to this instead
  # of mounting the raw /var/run/docker.sock (which is host root). Only the API
  # surface Compose needs (containers/images/networks/exec + POST) is enabled.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    restart: always
    # Hardening: block privilege escalation and drop all Linux capabilities.
    # HAProxy here binds :2375 (>1024) and reads the socket as owner-root, so it
    # needs no caps. Not published to the host; only reachable on docker_proxy.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      VOLUMES: 1
      EVENTS: 1
      EXEC: 1
      POST: 1
      INFO: 1
      PING: 1
      VERSION: 1
      # Everything else stays denied (default 0): BUILD, AUTH, SECRETS, SWARM, …
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - docker_proxy

  # Resident image-level updater. Watches a trigger file (written by dlux's
  # update engine) and runs a full `composer -u` on each request: pull →
  # version gate (refuse an image older than the active runtime) → recreate →
  # health → post_start (migrator). Uses the SAME image as this repo builds via
  # composer; pinned (not :latest) to avoid recreating itself mid-update.
  #
  # NOTE: the project must be brought up from its root dir so ${PWD} is the host
  # project path — composer runs `docker compose` against the host daemon, so it
  # needs the project mounted at the identical absolute path for bind mounts
  # (./media, ./logs, …) to resolve correctly (same pattern as composer start.sh).
  composer-updater:
    image: debeski/composer:latest
    restart: unless-stopped
    # Hardening: block privilege escalation and drop all Linux capabilities. It
    # only issues Docker API calls over TCP to the socket-proxy and reads/writes
    # dlux_runtime + the project dir; it needs no caps of its own.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    working_dir: "${PWD}"
    command:
      - watch
      - --trigger-file
      - /opt/dlux-runtime/state/image-update-request.json
      - --status-file
      - /opt/dlux-runtime/state/deploy-status.json
      # Short poll so an update request is picked up fast (keeps the live
      # progress page from lingering on a stale status). Writes deploy-log.txt
      # beside the status file for the maintenance page's console.
      - --interval
      - "5"
      # Registry availability check → dlux reads image-available.json to offer
      # an "application update" when a newer app image is published.
      - --check-image
      - ${WEB_IMAGE:-debeski/sales:latest}
      - --availability-file
      - /opt/dlux-runtime/state/image-available.json
      - --check-interval
      - "3600"
    environment:
      DOCKER_HOST: "tcp://docker-socket-proxy:2375"
      WEB_IMAGE: "${WEB_IMAGE:-debeski/sales:latest}"
      # Version gate: compare the pulled image's baked DjangoLux label against
      # the deployment's active runtime version (dlux active.json).
      COMPOSER_VERSION_LABEL: "org.switchlibya.dlux_baked_version"
      COMPOSER_RELEASE_MANIFEST_LABEL: "org.dlux.project.release-manifest"
      COMPOSER_ACTIVE_VERSION_FILE: "/opt/dlux-runtime/state/active.json"
      COMPOSER_ACTIVE_VERSION_KEY: "version"
      COMPOSER_STATUS_FILE: "/opt/dlux-runtime/state/deploy-status.json"
      # Never target the updater or the socket-proxy in bulk update runs, so the
      # watcher does not recreate itself (or its Docker gateway) mid-update.
      COMPOSER_EXCLUDE_SERVICES: "composer-updater,docker-socket-proxy"
    volumes:
      - "${PWD}:${PWD}"
      - dlux_runtime:/opt/dlux-runtime:rw
    depends_on:
      docker-socket-proxy:
        condition: service_started
    networks:
      - egress
      - docker_proxy
  # Composer-as-updater end

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:
  static:
  dlux_runtime:
  caddy_data:
  caddy_config:

networks:
  # Published ingress only (caddy). Bridge so the host can reach the app and
  # Caddy can reach Let's Encrypt (ACME) for automatic HTTPS.
  frontend:
    driver: bridge
  # Outbound internet for the narrow set of services that need it: smtp-relay
  # (→ Gmail), dlux-updater (→ PyPI wheels), celery (→ rate scrapes: cbl.gov.ly /
  # eanlibya.com), composer-updater (→ Docker Hub).
  egress:
    driver: bridge
  # Inter-service traffic with NO internet access — db, redis, web, celery, …
  internal:
    internal: true
  # Isolated path from composer-updater to the docker-socket-proxy only.
  docker_proxy:
    internal: true
