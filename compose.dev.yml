# Development override for compose.yml
# Usage: docker compose -f compose.yml -f compose.dev.yml up

name: sales-crm

services:
  smtp-relay:
    build: .
    image: !reset null

  dlux-updater:
    build: .
    image: !reset null
    volumes: !override
      - /Users/debeski/Desktop/depy/pkg-django-lux/dlux:/app/dlux:ro
      - ./catalog:/app/catalog:rw
      - ./common:/app/common:rw
      - ./config:/app/config:rw
      - ./finance:/app/finance:rw
      - ./sales:/app/sales:rw
      - dlux_runtime:/opt/dlux-runtime:rw
      - static:/app/staticfiles:rw
      - ./media/:/app/media/:rw
      - ./logs/:/app/logs:rw
    environment:
      DLUX_BAKED_VERSION: "1.3.0"

  caddy:
    # Local dev: plain HTTP only (no ACME/TLS), served on host port 90.
    # The ERP is the catch-all on :80; the portfolio keeps its localhost default
    # (never ACMEs, never collides with the :80 catch-all).
    ports: !override
      - target: 80
        published: "90"
        protocol: tcp
    environment:
      CADDY_ERP_ADDRESS: ":80"

  web:
    build: .
    image: !reset null
    volumes: !override
      - /Users/debeski/Desktop/depy/pkg-django-lux/dlux:/app/dlux:ro
      - ./catalog:/app/catalog:rw
      - ./common:/app/common:rw
      - ./config:/app/config:rw
      - ./finance:/app/finance:rw
      - ./sales:/app/sales:rw
      - static:/app/staticfiles:rw
      - ./media/:/app/media/:rw
      - ./logs/:/app/logs:rw
      - dlux_runtime:/opt/dlux-runtime:ro
      - ./imports/:/app/imports:ro
    environment:
      BASE_URL: "http://localhost:90"
      DEBUG_STATUS: "True"
      NGINX_PORT: "90"

  celery:
    build: .
    image: !reset null
    volumes: !override
      - /Users/debeski/Desktop/depy/pkg-django-lux/dlux:/app/dlux:ro
      - ./catalog:/app/catalog:rw
      - ./common:/app/common:rw
      - ./config:/app/config:rw
      - ./finance:/app/finance:rw
      - ./sales:/app/sales:rw
      - static:/app/staticfiles:rw
      - ./media/:/app/media/:rw
      - ./logs/:/app/logs:rw
      - dlux_runtime:/opt/dlux-runtime:ro