# Development override for compose.yml
# Usage: docker compose -f compose.yml -f compose.dev.yml up

name: sales-crm

services:
  smtp-relay:
    build: .
    image: !reset null
    volumes: !override
      - /Users/debeski/Desktop/depy/pkg-django-lux/dlux:/app/dlux:ro

  dlux-updater:
    build: .
    image: !reset null
    volumes: !override
      - /Users/debeski/Desktop/depy/pkg-django-lux/dlux:/app/dlux:ro
      - ./catalog:/app/catalog:rw
      - ./common:/app/common:rw
      - ./config:/app/config:rw
      - ./finance:/app/finance:rw
      - ./public_catalog:/app/public_catalog:rw
      - ./sales:/app/sales:rw
      - dlux_runtime:/opt/dlux-runtime:rw
      - static:/app/staticfiles:rw
      - ./media/:/app/media/:rw
      - ./logs/:/app/logs:rw
    environment:
      DLUX_BAKED_VERSION: "1.5.3"

  caddy:
    # Local dev: plain HTTP only (no ACME/TLS), served on host port 90.
    # The Django/DLux app is the catch-all on :80; the legacy ERP host redirects
    # back to /staff/ on the same local app.
    ports: !override
      - target: 80
        published: "90"
        protocol: tcp
    environment:
      CADDY_SITE_ADDRESS: ":80"
      CADDY_ERP_ADDRESS: "http://erp.localhost"
      CADDY_PRIMARY_URL: "http://localhost:90"

  web:
    build: .
    image: !reset null
    volumes: !override
      - /Users/debeski/Desktop/depy/pkg-django-lux/dlux:/app/dlux:ro
      - ./catalog:/app/catalog:rw
      - ./common:/app/common:rw
      - ./config:/app/config:rw
      - ./finance:/app/finance:rw
      - ./public_catalog:/app/public_catalog:rw
      - ./sales:/app/sales:rw
      - static:/app/staticfiles:rw
      - ./media/:/app/media/:rw
      - ./logs/:/app/logs:rw
      - dlux_runtime:/opt/dlux-runtime:ro
      - ./imports/:/app/imports:ro
    environment:
      BASE_URL: "http://localhost:90"
      DEBUG_STATUS: "True"
      NGINX_PORT: "90"

  celery:
    build: .
    image: !reset null
    volumes: !override
      - /Users/debeski/Desktop/depy/pkg-django-lux/dlux:/app/dlux:ro
      - ./catalog:/app/catalog:rw
      - ./common:/app/common:rw
      - ./config:/app/config:rw
      - ./finance:/app/finance:rw
      - ./public_catalog:/app/public_catalog:rw
      - ./sales:/app/sales:rw
      - static:/app/staticfiles:rw
      - ./media/:/app/media/:rw
      - ./logs/:/app/logs:rw
      - dlux_runtime:/opt/dlux-runtime:ro
