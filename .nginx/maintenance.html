<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Updating…</title>
  <style>
    :root { color-scheme: light dark; font-family: system-ui, -apple-system, sans-serif; }
    * { box-sizing: border-box; }
    body { min-height: 100vh; margin: 0; display: grid; place-items: center; background: #101827; color: #f8fafc; }
    main { width: min(46rem, calc(100% - 2rem)); padding: 2rem; border: 1px solid #334155; border-radius: 1rem; background: #172033; }
    h1 { margin: 0 0 .4rem; font-size: 1.4rem; }
    p { color: #cbd5e1; line-height: 1.6; margin: 0 0 1.2rem; }
    .track { height: .7rem; background: #0b1220; border: 1px solid #334155; border-radius: 999px; overflow: hidden; }
    .fill { height: 100%; width: 8%; background: linear-gradient(90deg,#2563eb,#38bdf8); border-radius: 999px; transition: width .6s ease; }
    .fill.ok { background: linear-gradient(90deg,#16a34a,#4ade80); }
    .fill.failed { background: linear-gradient(90deg,#b91c1c,#f87171); }
    .phase { margin: .7rem 0 0; font-size: .95rem; color: #e2e8f0; }
    .console { margin: 1.1rem 0 0; max-height: 15rem; overflow: auto; padding: .75rem .9rem; background: #0b1220; border: 1px solid #24304a; border-radius: .6rem; font: .8rem/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; color: #cbd5e1; white-space: pre-wrap; }
    .actions { margin: 1.2rem 0 0; }
    button { font: inherit; padding: .5rem 1rem; border-radius: .5rem; border: 1px solid #334155; background: #1e293b; color: #f8fafc; cursor: pointer; }
    button:hover { background: #334155; }
  </style>
</head>
<body>
  <main>
    <h1 id="title">Update in progress</h1>
    <p id="subtitle">A verified update is being applied. This page updates automatically and will return you to the app when it's done — no need to refresh.</p>
    <div class="track"><div id="fill" class="fill"></div></div>
    <div class="phase" id="phase">Starting…</div>
    <pre class="console" id="console" hidden></pre>
    <div class="actions" id="actions" hidden><button id="back" type="button">Return to the app</button></div>
  </main>
  <script>
  (function () {
    var STATUS_URL = '/_update/status.json', LOG_URL = '/_update/log.txt';
    var PCT = { preparing: 8, starting: 12, pulling: 38, recreating: 62, migrating: 84, restarting: 72, ready: 100, failed: 100 };
    var LABEL = { preparing: 'Preparing…', starting: 'Starting…', pulling: 'Pulling the new image…', recreating: 'Recreating containers…', migrating: 'Applying database migrations…', restarting: 'Restarting services…', ready: 'Done', failed: 'Update failed' };
    var IN_PROGRESS = { preparing: 1, starting: 1, pulling: 1, recreating: 1, migrating: 1, restarting: 1 };
    var fill = document.getElementById('fill'), phase = document.getElementById('phase'),
        cons = document.getElementById('console'), title = document.getElementById('title'),
        subtitle = document.getElementById('subtitle'), actions = document.getElementById('actions');
    var sawProgress = false, done = false, started = Date.now();

    function setBar(p, cls) { fill.style.width = Math.max(0, Math.min(100, p)) + '%'; fill.className = 'fill' + (cls ? ' ' + cls : ''); }

    function poll() {
      if (done) return;
      Promise.all([
        fetch(STATUS_URL, { cache: 'no-store' }).then(function (r) { return r.ok ? r.json() : null; }).catch(function () { return null; }),
        fetch(LOG_URL, { cache: 'no-store' }).then(function (r) { return r.ok ? r.text() : ''; }).catch(function () { return ''; })
      ]).then(function (res) {
        var doc = res[0], logText = (res[1] || '').trim();
        if (logText) { cons.hidden = false; cons.textContent = logText; cons.scrollTop = cons.scrollHeight; }
        var st = doc && typeof doc.status === 'string' ? doc.status : '';
        if (IN_PROGRESS[st]) sawProgress = true;
        if (st) { phase.textContent = LABEL[st] || st; setBar(PCT[st] != null ? PCT[st] : 15); }

        if (st === 'failed') {
          done = true; title.textContent = 'Update failed';
          subtitle.textContent = (doc && doc.error) ? String(doc.error) : 'The update did not complete. The previous version has been kept.';
          setBar(100, 'failed'); phase.textContent = 'Failed'; actions.hidden = false; return;
        }
        // Honor 'ready' only after real progress this session (ignore a stale
        // 'ready' left over from a previous update) or after a safety timeout.
        if (st === 'ready' && (sawProgress || Date.now() - started > 20000)) {
          done = true; title.textContent = 'Update complete'; subtitle.textContent = 'Reconnecting…';
          setBar(100, 'ok'); phase.textContent = 'Done';
          setTimeout(function () { window.location.reload(); }, 1200); return;
        }
        setTimeout(poll, 2000);
      });
    }
    document.getElementById('back').addEventListener('click', function () { window.location.reload(); });
    poll();
  })();
  </script>
</body>
</html>
