name: Release

# Triggered by pushing a version tag, e.g.:
#   git tag -a v0.1.0 -m "v0.1.0" && git push origin v0.1.0
#
# Pipeline:
#   build-push     -> verify tag == VERSION == release manifest, smoke-test, then multi-arch
#                     (amd64+arm64) build & push debeski/sales:<ver> + :latest
#   github-release -> create the GitHub Release from the matching CHANGELOG section
#
# One-time setup (see docs/RELEASING.md): add repo secrets
#   DOCKERHUB_USERNAME  - Docker Hub account/namespace (debeski)
#   DOCKERHUB_TOKEN     - Docker Hub access token with read/write to debeski/sales

on:
  push:
    tags: ["v*"]

env:
  IMAGE: debeski/sales

permissions:
  contents: read

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag and project release manifest
        id: project_manifest
        run: |
          python3 tools/validate_project_release_manifest.py

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Resolve baked DjangoLux version
        id: dlux
        run: |
          ver="$(grep -oiE 'django-lux(\[[^]]*\])?[[:space:]]*==[[:space:]]*[0-9][0-9A-Za-z.\-]*' requirements.txt \
                 | grep -oE '[0-9][0-9A-Za-z.\-]*$' | head -n1)"
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "Baked DjangoLux version: '$ver'"

      # Build the amd64 image locally and run runtime smoke tests BEFORE any
      # push, so a broken image never reaches Docker Hub. The layers are cached
      # and reused by the multi-arch push below.
      - name: Build amd64 image for testing
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          build-args: |
            DLUX_BAKED_VERSION=${{ steps.dlux.outputs.version }}
            DLUX_PROJECT_RELEASE_MANIFEST=${{ steps.project_manifest.outputs.json }}
          tags: ${{ env.IMAGE }}:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Runtime smoke tests
        run: ./scripts/smoke-test.sh ${{ env.IMAGE }}:ci-test

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            DLUX_BAKED_VERSION=${{ steps.dlux.outputs.version }}
            DLUX_PROJECT_RELEASE_MANIFEST=${{ steps.project_manifest.outputs.json }}
          tags: |
            ${{ env.IMAGE }}:${{ github.ref_name }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  github-release:
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the GitHub Release
    steps:
      - uses: actions/checkout@v4

      - name: Extract this version's CHANGELOG section
        run: |
          ver="${GITHUB_REF_NAME#v}"
          awk -v ver="$ver" '
            $0 ~ ("^## v" ver "([^0-9.]|$)") { grab=1; next }
            grab && /^## v/ { exit }
            grab { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Release ${GITHUB_REF_NAME}." > RELEASE_NOTES.md
          fi
          echo "---- release notes ----"; cat RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
