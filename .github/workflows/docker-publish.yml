name: Build and Push Docker Image

# Builds the app image from the repo-root Dockerfile and pushes it to Docker Hub
# as debeski/sales:latest (plus an immutable :<git-sha> tag for traceability).
#
# Requires two repository SECRETS (Settings → Secrets and variables → Actions → Secrets):
#   DOCKERHUB_USERNAME  – your Docker Hub username (debeski)
#   DOCKERHUB_TOKEN     – a Docker Hub access token with Read/Write scope
# A token MUST live under "Secrets", not "Variables" (Variables are printed in logs).

on:
  push:
    branches: [main, master]
  workflow_dispatch:        # allow manual runs from the Actions tab

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            debeski/sales:latest
            debeski/sales:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
